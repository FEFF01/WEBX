<html>

<head>
    <title>webx</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>
    <script id="test_code" type="text/babel">
        let test = { a: 111111 }, test2 = "b";

        Object.defineProperty(window, "test", {//测试导出方法
            get() {
                return test;
            },
            set(val) {
                test[test2+"b"] = val;
            }
        })
        document.body.appendChild(<a>\(test.a+""+test.b)</a>)

    </script>
    <script src="./js/test.js" type="text/javascript"></script>
    <script>
        eval(webx(test_code.innerHTML))
    </script>
</body>
